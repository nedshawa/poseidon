name: secrets
version: "1.0"
description: "Standard secret access, registry tracking, and change logging across all projects"
scope: all-projects
enabled: true

triggers:
  - event: session-end
    condition: algorithm-session-completed
  - event: pre-tool
    condition: secret-pattern-detected
  - event: manual
    condition: always

standard:
  registry_file: "secrets-registry.md"
  secret_patterns:
    - "sk-[a-zA-Z0-9]{20,}"
    - "sk-ant-[a-zA-Z0-9\\-]{20,}"
    - "ghp_[a-zA-Z0-9]{36}"
    - "AKIA[0-9A-Z]{16}"
    - "pplx-[a-zA-Z0-9]{20,}"
    - "xai-[a-zA-Z0-9]{20,}"
    - "r8_[a-zA-Z0-9]{20,}"
    - "apify_api_[a-zA-Z0-9]{20,}"
  scan_extensions:
    - ".ts"
    - ".js"
    - ".py"
    - ".sh"
    - ".yaml"
    - ".yml"
    - ".json"
    - ".env"
    - ".md"
  ignore_paths:
    - "node_modules"
    - ".git"
    - "secrets.enc"
    - "secrets-registry.md"

enforcement:
  on_session_end: warn
  on_pre_tool: block
  on_manual: report

audit:
  log_path: "memory/learning/regimes/secrets.jsonl"
