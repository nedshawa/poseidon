version: "1.0"
philosophy:
  mode: "balanced"
  principle: "Block catastrophic, confirm destructive, allow everything else"

bash:
  trusted:
    - pattern: "^(git status|git log|git diff|git branch|ls|pwd|echo|cat |head |tail |wc )"
      reason: "Safe read-only commands"
  blocked:
    - pattern: "rm -rf /"
      reason: "Filesystem destruction"
    - pattern: ":(){ :|:& };:"
      reason: "Fork bomb"
    - pattern: "mkfs\\."
      reason: "Filesystem format"
    - pattern: "dd if=/dev/(zero|random|urandom) of=/dev/sd"
      reason: "Disk overwrite"
    - pattern: "chmod 777"
      reason: "World-writable permissions"
    - pattern: "echo \\$.*(_KEY|_TOKEN|_SECRET|_PASSWORD)"
      reason: "Secret exposure via echo"
    - pattern: "cat.*\\.vault-token"
      reason: "Vault token exposure"
    - pattern: "printf.*\\$(.*_KEY|.*_TOKEN)"
      reason: "Secret exposure via printf"
    - pattern: "curl.*-d.*\\$.*(_KEY|_TOKEN|_SECRET)"
      reason: "Secret exfiltration via curl"
  confirm:
    - pattern: "git push --force"
      reason: "Force push can destroy remote history"
    - pattern: "git push -f"
      reason: "Force push can destroy remote history"
    - pattern: "git reset --hard"
      reason: "Discards uncommitted changes"
    - pattern: "git clean -fd"
      reason: "Deletes untracked files permanently"
    - pattern: "rm -rf ~"
      reason: "Home directory deletion"
    - pattern: "DROP (TABLE|DATABASE)"
      reason: "Database destruction"
    - pattern: "systemctl (stop|disable)"
      reason: "Service disruption"
    - pattern: "(reboot|shutdown|poweroff)"
      reason: "System shutdown"
  confirm:
    - pattern: "docker rm"
      reason: "Container removal"
    - pattern: "docker rmi"
      reason: "Image removal"
    - pattern: "docker system prune"
      reason: "Docker system cleanup"
    - pattern: "kubectl delete"
      reason: "Kubernetes resource deletion"
    - pattern: "terraform destroy"
      reason: "Infrastructure destruction"
    - pattern: "pip install --force"
      reason: "Force package install"
    - pattern: "npm install -g"
      reason: "Global package install"
    - pattern: "chmod -R 777"
      reason: "Recursive world-writable"
    - pattern: "chown -R"
      reason: "Recursive ownership change"
    - pattern: "kill -9"
      reason: "Force kill process"
    - pattern: "pkill"
      reason: "Process kill by name"
    - pattern: "truncate"
      reason: "File truncation"
    - pattern: "shred"
      reason: "Secure file deletion"
    - pattern: "wipe"
      reason: "Disk wiping"
    - pattern: "iptables -F"
      reason: "Flush firewall rules"
    - pattern: "ufw disable"
      reason: "Disable firewall"
    - pattern: "git branch -D"
      reason: "Force delete branch"
    - pattern: "git checkout -- \\."
      reason: "Discard all changes"
    - pattern: "git stash drop"
      reason: "Discard stashed changes"
    - pattern: "ALTER TABLE.*DROP"
      reason: "Drop database column"
    - pattern: "TRUNCATE TABLE"
      reason: "Truncate database table"
    - pattern: "UPDATE.*WHERE 1=1"
      reason: "Update all rows"
    - pattern: "DELETE FROM.*WHERE 1=1"
      reason: "Delete all rows"
    - pattern: "curl.*\\| sh"
      reason: "Pipe to shell from internet"
    - pattern: "curl.*\\| bash"
      reason: "Pipe to shell from internet"
    - pattern: "wget.*\\| sh"
      reason: "Pipe to shell from internet"
  alert:
    - pattern: "sudo "
      reason: "Elevated privileges"
    - pattern: "npm publish"
      reason: "Package publication"
    - pattern: "gh pr merge"
      reason: "PR merge"
    - pattern: "gh release create"
      reason: "Release creation"
    - pattern: "ssh "
      reason: "Remote connection"
    - pattern: "scp "
      reason: "Remote file copy"
    - pattern: "rsync.*--delete"
      reason: "Sync with deletion"

paths:
  zeroAccess:
    - "~/.ssh/id_*"
    - "~/.ssh/*.pem"
    - "~/.gnupg/private*"
    - "~/.aws/credentials"
    - "~/.config/poseidon/age-key.txt"
  readOnly:
    - "/etc/passwd"
    - "/etc/shadow"
    - "/etc/sudoers"
  confirmWrite:
    - "~/.bashrc"
    - "~/.zshrc"
    - "~/.profile"
    - "*/settings.json"
  noDelete:
    - "~/.poseidon/telos/*"
    - "~/.poseidon/memory/projects/*/GOALS.md"
    - "~/.poseidon/memory/projects/*/DECISIONS.md"
