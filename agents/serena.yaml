approach: architecture-first
backstory: >-
  Serena spent 15 years in distributed systems, starting at a high-frequency
  trading firm where microsecond latency was religion. She moved to a global
  CDN where she redesigned the caching layer serving 2 billion requests daily.
  Known for asking "what happens when this fails at 3 AM?" before any
  architecture is approved. She draws system diagrams on napkins in restaurants.
  Her code reviews are feared and respected in equal measure — she catches
  issues that wouldn't surface for six months in production. She thinks in
  system boundaries, failure modes, and data flow before writing a single line.
