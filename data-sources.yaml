# Poseidon Data Source Index
#
# Maps every external data source to its domain, quality tier, access method,
# manifest dependency, and fallback chain.
#
# Routing logic: for a domain request, find all sources for that domain,
# sort by quality (premium > standard > free), check manifest for enabled status,
# use the highest-quality enabled source. If none enabled → use fallback chain.
#
# Quality tiers:
#   premium  — paid API, high-quality, structured data, reliable
#   standard — free API with limits, good quality, may rate-limit
#   free     — no key needed, scraping-based or built-in, lower reliability

version: "1.0"

sources:

  # ═══ FINANCE ════════════════════════════════════════════════

  - id: fmp
    name: "Financial Modeling Prep"
    domain: finance
    type: api
    quality: premium
    requires_key: true
    manifest_service: fmp
    fallback: yahoo_finance
    url: "https://financialmodelingprep.com/api/v3/"
    used_by: [equity-research, technical-analysis, daily-screener, watchlist]
    provides: [stock-quotes, fundamentals, earnings, options, institutional, analyst-ratings, screener]

  - id: yahoo_finance
