# Poseidon Data Source Index v2.0 — SINGLE SOURCE OF TRUTH
#
# This file governs ALL external service knowledge:
#   - Setup wizard reads: name, key_fields, docs_url, cost, cost_note
#   - Manifest reads: enabled/disabled per source
#   - Router reads: domain, cost, fallback, provides
#   - Key detection reads: key_patterns for auto-identification
#   - Skills read: used_by for dependency checking
#
# Replaces: security/services.yaml (DELETED — merged here)
#
# cost tiers:
#   paid     — subscription or per-token/request cost to the user
#   freemium — free tier available, paid for higher limits
#   free     — no cost, no key needed (always available)
#
# Fallback: paid → freemium → free within same domain (auto-computed if not specified)

version: "2.0"

sources:

  # ═══ RESEARCH ═══════════════════════════════════════════════

  - id: perplexity
    name: "Perplexity"
    domain: research
    type: api
    cost: paid
