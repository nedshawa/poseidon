# Poseidon Skill Index
# Maps every skill to its tier, domain tags, and relevance scoring.
#
# Tiers:
#   universal   — always available, auto-activated for every project
#   product     — available when project domain matches (finance, security, content, etc.)
#   project     — created by and for a specific project (in memory/projects/{id}/skills/)
#
# This file is read by session-start to inject priority-ordered skill context.
# Claude Code still scans the full skills/ directory — this index GUIDES selection,
# it doesn't restrict access.

version: "1.0"

skills:
  # ─── UNIVERSAL (always relevant, every project) ───
  - name: research
    tier: universal
    domains: [all]
    priority: 95
    description: "Multi-agent research with 4 tiers"

