# Poseidon Skill Index v2.0
#
# 3-tier taxonomy with explicit matching:
#
# UNIVERSAL  — always loaded, every project. No configuration needed.
# PRODUCT    — loaded ONLY when:
#              a) A universal skill depends on it (requires: [skill-name])
#              b) The project explicitly requests it (META.yaml products: [skill-name])
# PROJECT    — created by/for a specific project (in memory/projects/{id}/skills/)
#
# No implicit domain matching. Product skills require explicit request.
# This makes skill loading PREDICTABLE — you always know why a skill loaded.

version: "2.0"

skills:
