# Voice configurations for agent personalities
# Each voice maps to an ElevenLabs voice ID
# Users add their own voices here or in ~/.poseidon/agents/{name}.yaml

voices:
  default:
    provider: "elevenlabs"
    voice_id: ""  # User fills in their preferred default voice
    description: "Default agent voice"
    settings:
      stability: 0.5
      similarity_boost: 0.75
      style: 0.0
      speed: 1.0

